<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Giriş - Tatlı Rüya Pastanesi</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍰</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="logo">🍰 Tatlı Rüya</div>
    <p class="subtitle">Yönetici Paneline Giriş</p>

    <form id="loginForm">
      <div class="form-group">
        <label><i class="fa-solid fa-user"></i> Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-lock"></i> Şifre</label>
        <input type="password" id="password" placeholder="••••" required autocomplete="current-password">
      </div>
      <p class="error-msg" id="loginError">Hatalı kullanıcı adı veya şifre!</p>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
      </button>
    </form>

    <p style="margin-top:20px;font-size:0.8rem;color:var(--gray-light)">
      <a href="/" style="color:var(--pink-500)">← Siteye Dön</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin.html';
        } else {
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Bağlantı hatası!';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
